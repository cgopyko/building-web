<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>관리비 조회 로그인</title>
</head>

<body class="bg-light">
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="card shadow p-4">
            <h3 class="text-center mb-4">내 관리비 조회</h3>
            <form action="/view-bill" method="POST">
                <div class="mb-3">
                    <label class="form-label">사업자 등록번호 뒷자리</label>
                    <input type="password" name="biz_last" class="form-control" placeholder="마지막 5자리 입력" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">조회 년월</label>
                    <input type="text" name="mmyy" class="form-control" placeholder="예: 2405" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">조회하기</button>
            </form>
            {% if error %}
            <p class="text-danger mt-3 text-center small">{{ error }}</p>
            {% endif %}
        </div>
    </div>
</body>

</html>
