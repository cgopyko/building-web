<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>빌딩 관리비 입력 시스템</title>
</head>
<body class="p-4">
    <div class="container border rounded p-4 bg-white shadow-sm">
        <h2 class="mb-4 text-center">🏢 관리비 정산 입력</h2>
        
        <form action="/calculate" method="POST">
            <div class="row mb-4">
                <div class="col">
                    <label>정산 년월 (예: 2405)</label>
                    <input type="text" name="mmyy" class="form-control" placeholder="YYMM" required>
                </div>
                <div class="col">
                    <label>공용 전기료 총액</label>
                    <input type="number" name="total_elec" class="form-control" required>
                </div>
                <div class="col">
                    <label>공용 수도료 총액</label>
                    <input type="number" name="total_water" class="form-control" required>
                </div>
            </div>

            <h4>업체별 전기 사용량 입력</h4>
            <table class="table table-hover mt-3">
                <thead class="table-light">
                    <tr>
                        <th>업체명</th>
                        <th>대표자</th>
                        <th>이번 달 전기 사용량 (kWh)</th>
                    </tr>
                </thead>
                <tbody>
                    {% for company in companies %}
                    <tr>
                        <td>{{ company.company_name }}</td>
                        <td>{{ company.ceo_name }}</td>
                        <td>
                            <input type="number" name="usage_{{ company.company_id }}" class="form-control" required>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            
            <div class="text-end">
                <button type="submit" class="btn btn-primary btn-lg">관리비 산출 및 저장</button>
            </div>
        </form>
    </div>
</body>
</html>
